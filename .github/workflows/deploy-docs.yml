name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'classifier/**'
      - 'handoff/**'
      - 'verification/**'
      - 'examples/**'
      - 'experiments/**'
      - 'PROJECT_ROADMAP.md'
      - 'YC_BLINDSPOTS.md'
      - 'README.md'
      - 'LEARNING_PLAN.md'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
